name: Publish User Guide

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@1.5.10

      - name: Install dependencies
        run: npm install

      - name: Build Tauri app
        run: |
          cd src-tauri
          tauri build

      - name: Prepare site
        run: |
          SITE_DIR=site
          mkdir -p "$SITE_DIR/downloads"
          DMG_PATH=$(ls src-tauri/target/release/bundle/dmg/*.dmg | head -n 1)
          if [ -z "$DMG_PATH" ]; then
            echo "No DMG generated" >&2
            exit 1
          fi
          DMG_NAME=$(basename "$DMG_PATH")
          cp "$DMG_PATH" "$SITE_DIR/downloads/"
          USER_GUIDE_HTML=$(mktemp)
          npx --yes marked docs/user-guide.md > "$USER_GUIDE_HTML"
          cat <<HTML > "$SITE_DIR/index.html"
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FerrumVault User Guide</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 2rem; line-height: 1.6; }
    .download-link { display: inline-block; margin: 1rem 0; padding: 0.75rem 1.25rem; background: #4f46e5; color: #fff; border-radius: 8px; text-decoration: none; }
    .download-link:hover { background: #4338ca; }
    .guide-body { max-width: 960px; }
  </style>
</head>
<body>
  <h1>FerrumVault User Guide</h1>
  <a class="download-link" href="downloads/$DMG_NAME">Download the latest macOS build</a>
  <div class="guide-body">
$(cat "$USER_GUIDE_HTML")
  </div>
</body>
</html>
HTML
          rm "$USER_GUIDE_HTML"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
