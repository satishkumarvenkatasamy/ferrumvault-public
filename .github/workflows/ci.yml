name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Cargo fmt check
        run: cargo fmt -- --check
      - name: Cargo build
        run: cargo build --release
      - name: Cargo test
        run: cargo test
      - uses: actions/setup-node@v4
        if: matrix.os == 'macos-latest' || matrix.os == 'windows-latest'
        with:
          node-version: '20'
      - name: Install Tauri CLI
        if: matrix.os == 'macos-latest' || matrix.os == 'windows-latest'
        shell: bash
        run: npm install -g @tauri-apps/cli@1.5.10
      - name: Build FerrumVault desktop
        if: matrix.os == 'macos-latest' || matrix.os == 'windows-latest'
        shell: bash
        env:
          TAURI_CLI_NO_CUSTOM_PROTOCOL: '1'
          TAURI_SKIP_FEATURE_GLOBAL_TAURI: '1'
        run: |
          cd src-tauri
          tauri build
      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/release/credmanager_app.exe artifacts/
          else
            cp target/release/credmanager_app artifacts/
          fi
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            cp -R src-tauri/target/release/bundle/macos/FerrumVault.app artifacts/FerrumVault.app
            cp src-tauri/target/release/bundle/dmg/FerrumVault_*.dmg artifacts/ || true
          elif [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp src-tauri/target/release/bundle/msi/FerrumVault*.msi artifacts/ || true
            cp src-tauri/target/release/bundle/nsis/FerrumVault*.exe artifacts/ || true
          else
            cp src-tauri/target/release/bundle/appimage/FerrumVault*.AppImage artifacts/ || true
            cp src-tauri/target/release/bundle/deb/FerrumVault*.deb artifacts/ || true
          fi
          python -c "import shutil; shutil.make_archive('artifacts/credmanager-ui', 'zip', 'ui-frontend', 'dist')"
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: artifacts
          if-no-files-found: error

  harness:
    name: Harness (${{ matrix.total }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        total: [500, 1000, 2000]
    env:
      HARNESS_PASSWORD: CIHarnessSecret123!
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run harness
        run: |
          cargo run -- harness \
            --total ${{ matrix.total }} \
            --profile ci-${{ matrix.total }} \
            --base-dir ./tmp-vaults \
            --password "$HARNESS_PASSWORD"
